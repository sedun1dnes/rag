version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${PORT}:5000"
    environment:
      PORT: "${PORT}"
      RAG_DOCS_DIR: "${RAG_DOCS_DIR}"
      RAG_UPLOADS_DIR: "${RAG_UPLOADS_DIR}"
      RAG_MAX_UPLOAD_MB: "${RAG_MAX_UPLOAD_MB}"

      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

    depends_on:
      - postgres
      # - qdrant
    volumes:
      - ./docs:/app/docs
      - ./uploads:/app/uploads

  daemon:
    build:
      context: .
      dockerfile: daemon/Dockerfile
    environment:
      RAG_UPLOADS_DIR: "${RAG_UPLOADS_DIR}"

      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

    depends_on:
      - postgres
      - qdrant
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend/rag-ui
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT}:80"

  postgres:
    image: postgres:15
    container_name: rag-postgres
    restart: always
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage